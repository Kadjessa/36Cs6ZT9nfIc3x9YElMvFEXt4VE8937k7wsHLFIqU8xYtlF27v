<?php

$error = "";

/**
 * Retourne le username si le hash match
 */
function findUserByPassword($file, $hashInput) {
    if (!file_exists($file)) return null;

    $lines = file($file, FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES);

    foreach ($lines as $line) {
        [$user, $hash] = explode(":", trim($line), 2);

        if (hash_equals($hash, $hashInput)) {
            return $user;
        }
    }

    return null;
}

if ($_SERVER["REQUEST_METHOD"] === "POST") {

    $password = $_POST['password'] ?? '';

        "u06PWp1Sg6X1IRyetJgx7kvQ6piG0W0BgenZVYhYz7ayua5t7U.txt",
        $hashInput

    if ($user !== null) {

        echo "<script>
            sessionStorage.setItem('user', " . json_encode($user) . ");
            window.location.href = 'index.html';
        </script>";
        exit;

    } else {
        $error = "Qui es tu ?";
    }
}
