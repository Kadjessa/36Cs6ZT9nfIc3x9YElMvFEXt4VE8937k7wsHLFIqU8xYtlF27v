<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Chat chiffré</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        #chat { margin-top: 20px; }
        .msg {
            padding: 8px;
            border: 1px solid #ccc;
            margin: 5px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>🤩Amusez-vous !</h2>

<input id="msgInput" placeholder="Écris ton message..." />
<button onclick="sendMessage()">Envoyer</button>

<div id="chat"></div>

<script>
// --- USER MANAGEMENT (URL → sessionStorage → nettoyage URL)
const params = new URLSearchParams(window.location.search);
let username = params.get("user");

// Si user dans URL → on le stocke
if (username) {
    sessionStorage.setItem("user", username);

    // Nettoyage de l'URL (supprime ?user=...)
    window.history.replaceState({}, document.title, window.location.pathname);
} else {
    // Sinon on récupère depuis sessionStorage
    username = sessionStorage.getItem("user");
}

// Si toujours pas de user → redirection
if (!username) {
    window.location.href = "https://kyra.alwaysdata.net";
}

// --- PASSWORD
let password = sessionStorage.getItem("pass");

if (!password) {
    password = prompt("Mot de passe ?");
    sessionStorage.setItem("pass", password);
}

// --- AES KEY DERIVATION (SHA-256 du mot de passe)
async function getKey() {
    const enc = new TextEncoder();
    const hash = await crypto.subtle.digest("SHA-256", enc.encode(password));
    return crypto.subtle.importKey(
        "raw",
        hash,
        "AES-GCM",
        false,
        ["encrypt", "decrypt"]
    );
}

// --- ENCRYPT
async function encrypt(text) {
    const key = await getKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = new TextEncoder();

    const cipher = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        key,
        enc.encode(text)
    );

    const buf = new Uint8Array(iv.length + cipher.byteLength);
    buf.set(iv, 0);
    buf.set(new Uint8Array(cipher), iv.length);

    return btoa(String.fromCharCode(...buf));
}

// --- DECRYPT
async function decrypt(data) {
    const key = await getKey();
    const buf = Uint8Array.from(atob(data), c => c.charCodeAt(0));

    const iv = buf.slice(0, 12);
    const cipher = buf.slice(12);

    const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: iv },
        key,
        cipher
    );

    return new TextDecoder().decode(plain);
}

// --- SEND MESSAGE
async function sendMessage() {
    const input = document.getElementById("msgInput");
    const text = input.value;

    if (!text.trim()) return;

    const cipher = await encrypt(text);

    fetch("https://kyra.alwaysdata.net/send.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `user=${encodeURIComponent(username)}&msg=${encodeURIComponent(cipher)}`
    });

    input.value = "";
}

// --- LOAD MESSAGES
async function loadMessages() {
    const res = await fetch("https://kyra.alwaysdata.net/get.php");
    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    for (let m of data) {
        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = m.user + " : (clique pour voir)";

        div.onclick = async () => {
            try {
                const clear = await decrypt(m.msg);
                div.textContent = m.user + " : " + clear;

                // suppression après 10s
                setTimeout(() => {
                    fetch("https://kyra.alwaysdata.net/delete.php?id=" + m.id);
                    div.remove();
                }, 10000);
            } catch (e) {
                div.textContent = m.user + " : (impossible de déchiffrer)";
            }
        };

        chat.appendChild(div);
    }
}

setInterval(loadMessages, 5000);
loadMessages();

document.getElementById("msgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
